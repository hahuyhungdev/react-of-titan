name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend-architecture-template/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend-architecture-template

      - name: Lint
        run: pnpm lint
        working-directory: frontend-architecture-template

      - name: Typecheck
        run: pnpm typecheck
        working-directory: frontend-architecture-template

      - name: Build
        run: pnpm build
        working-directory: frontend-architecture-template
